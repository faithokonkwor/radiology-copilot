services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radiology_copilot
      POSTGRES_USER: radiology
      POSTGRES_PASSWORD: radiology
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiology -d radiology_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://radiology:radiology@postgres:5432/radiology_copilot
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
